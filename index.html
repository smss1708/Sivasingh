<!DOCTYPE html>
<html lang="hi">
<head>

    <title>Tum Ho ❤️ - My Love</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffffff, #fff5f7);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            background rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 
                0 20px 60px rgba(255, 107, 157, 0.08),
                0 40px 80px rgba(255, 107, 157, 0.12),
                0 0 0 1px rgba(255, 107, 157, 0.1);
            position: relative;
            min-height: 500px;
        }

        .header-icon {
            font-size: 3.5em;
            margin-bottom: 5px;
            animation: floatHeart 2s ease-in-out infinite;
        }

        @keyframes floatHeart {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {

            color: #e75480;
            font-size: 3.2em;

        .subtitle {

            font-size: 0.9em;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 25px;
            font-weight: 300;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, #ff8fab, #ffb3c6);
            margin: 0 auto 25px auto;
            border-radius: 10px;
        }

        /* Lyrics Box */
        .lyrics-box {
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .line {
            font-size: 1.3em;
            color: #444;
            font-weight: 400;
            margin: 12px 0;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease;
            text-shadow: 0 0 0px;
        }

        .line.show {
            opacity: 1;
            transform: translateY(0);
        }

        .line .emoji-big {
            font 1.4em;
            display: inline-block;
            margin-right: 6px;
        }

        .line.highlight {
            color: #e75480;
            font-weight: 600;
        }

        .line.highlight-line {
            color: #e75480;
            font-size: 1.5em;
            font-weight: 600;
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: #ffe0e6;
            border-radius: 10px;
            margin-top: 25px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff8fab, #e75480);
            border-radius: 10px;
            transition: width 1s linear;
        }

        .timer {
            color  b0b0b0);
            font-size: 0.8em;
            margin-top: 12px;
            font-weight: 300;
        }

        .end-message {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }

        .end-message.active {
            display: flex;
        }

        .end-message h2 {
            font-family: 'Great Vibes', cursive;
            color: #e75480;
            font-size: 2.8em;
            margin: 10px 0;
        }

        .end-message p {
            font-size: 1.2em;
            color: #666;
            margin: 8px 0;
        }

        .btn-yes {
            margin-top: 20px;
            padding: 14px 50px;
            font-size: 1.2em;
            background: linear-gradient(45deg, #ff8fab, #e75480);
            color: #fff);
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(231, 84, 128, 0.3);
            transition: all 0.3s;
            font-weight
        }

        .btn-yes:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(231, 84, 128, 0.4);
            transform: scale(1.05);
        }

        .floating-hearts {
            position: fixed;
            top: 0;
            left     100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .floating-hearts span {
            position: absolute;
            font-size: 20px;
            animation rise linear infinite;
            opacity: 0.15;
        }

        @keyframes rise {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0.15;
            }
            100% {
                transform: translateY(-100px) rotate(720deg);
                opacity: 0;
            }
        }

        .restart-btn {
            background: none;
            border: 1px solid #e75480;
            color: #e75480;
            font-size: 0.9em;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s;
        }
            color: #e75480;
        }

        .restart btn:hover {
            outline: none;
        }

        .restart-btn:hover       background: #ffe0e6;
        }

        @media (max-width: 480px) {
            .container padding: 30px 20px;
            }
            .line font-size: 1.1em;
            h1 { font-size: 2.5em; }
        }
    </style>
</head>
