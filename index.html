<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tum Ho ❤️ - My Love</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffffff, #fff5f7);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(255, 107, 157, 0.08);
            position: relative;
            min-height: 550px;
        }

        .header-icon {
            font-size: 3.5em;
            margin-bottom: 5px;
            animation: floatHeart 2s ease-in-out infinite;
        }

        @keyframes floatHeart {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            color: #e75480;
            font-size: 3.2em;
            margin-bottom: 0px;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #c0a0a8;
            font-size: 0.9em;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 25px;
            font-weight: 300;
        }

        .lyrics-box {
            min-height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .line {
            font-size: 1.4em;
            color: #444;
            display: none;
            animation: fadeIn 1s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .highlight-line {
            color: #e75480;
            font-weight: 600;
            font-size: 1.6em;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #ffe0e6;
            border-radius: 10px;
            margin-top: 40px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff8fab, #e75480);
            transition: width 0.5s linear;
        }

        .timer {
            color: #b0b0b0;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .end-message {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .end-message.active {
            display: flex;
            animation: fadeIn 1.5s ease;
        }

        .btn-yes {
            margin-top: 20px;
            padding: 14px 40px;
            background: linear-gradient(45deg, #ff8fab, #e75480);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(231, 84, 128, 0.3);
        }

        .floating-hearts span {
            position: absolute;
            animation: rise linear infinite;
            opacity: 0.2;
        }

        @keyframes rise {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0.2; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="floating-hearts" id="floatingHearts"></div>

    <div class="container">
        <div class="header-icon">💖</div>
        <h1>Tum Ho</h1>
        <div class="subtitle">~ Mere liye sab kuch ~</div>

        <div class="lyrics-box" id="lyricsBox">
            </div>

        <div class="end-message" id="endMessage">
            <div style="font-size: 3em;">💕</div>
            <h2>Tum Ho... Bas Tum Ho</h2>
            <p>Har dhadkan kehti hai — I Love You!</p>
            <button class="btn-yes" onclick="alert('I Love You Too! ❤️')">💌 Yes, I Love You Too!</button>
            <p style="cursor:pointer; color:#e75480; margin-top:15px;" onclick="location.reload()">🔄 Restart</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="timer" id="timer">0:00 / 1:00</div>
    </div>

    <script>
        const lyrics = [
            { text: "Subah ki pehli kiran ho tum", emoji: "🌅" },
            { text: "Mere sapno ka jahan ho tum", emoji: "✨" },
            { text: "Har dhadkan mein basi ho tum", emoji: "💓" },
            { text: "Tum ho, tum ho...", emoji: "🌟", highlight: true },
            { text: "Meri manzil, mera safar ho tum", emoji: "🎯" },
            { text: "Meri khushi, mera ghar ho tum", emoji: "😊" },
            { text: "Tum bin kya rakha hai yahan", emoji: "💔" },
            { text: "Tum ho meri puri duniya", emoji: "🌍", highlight: true },
            { text: "Tum ho bas tum ho...", emoji: "💕", highlight: true }
        ];

        const lyricsBox = document.getElementById('lyricsBox');
        const progressFill = document.getElementById('progressFill');
        const timerDisplay = document.getElementById('timer');
        const endMessage = document.getElementById('endMessage');

        let currentIndex = 0;
        const totalDuration = 60; // 60 Seconds
        const timePerLine = (totalDuration / lyrics.length) * 1000;

        function showNextLine() {
            if (currentIndex < lyrics.length) {
                const item = lyrics[currentIndex];
                lyricsBox.innerHTML = `
                    <div class="line ${item.highlight ? 'highlight-line' : ''}" style="display:block">
                        <span>${item.emoji}</span><br>
                        ${item.text}
                    </div>
                `;
                
                currentIndex++;
                let progress = (currentIndex / lyrics.length) * 100;
                progressFill.style.width = progress + "%";
                
                let timeSpent = Math.round((currentIndex / lyrics.length) * totalDuration);
                timerDisplay.textContent = `0:${timeSpent < 10 ? '0'+timeSpent : timeSpent} / 1:00`;

                setTimeout(showNextLine, timePerLine);
            } else {
                lyricsBox.style.display = 'none';
                endMessage.classList.add('active');
                timerDisplay.textContent = "1:00 / 1:00 ✅";
            }
        }

        function createHearts() {
            const container = document.getElementById('floatingHearts');
            for (let i = 0; i < 15; i++) {
                const span = document.createElement('span');
                span.textContent = '❤️';
                span.style.left = Math.random() * 100 + '%';
                span.style.fontSize = (Math.random() * 20 + 10) + 'px';
                span.style.animationDuration = (Math.random() * 5 + 5) + 's';
                container.appendChild(span);
            }
        }

        window.onload = () => {
            createHearts();
            setTimeout(showNextLine, 1000);
        };
    </script>
</body>
</html>
